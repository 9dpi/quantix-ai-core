<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantix AI Core – MT4 Execution Dashboard</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="../static/img/favicon.svg">
    <style>
        .dashboard-grid {
            display: flex;
            flex-direction: column;
            gap: 32px;
            padding: 40px 24px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .bento-block {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 32px;
        }

        .block-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
        }

        td {
            padding: 16px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-main);
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.75rem;
        }

        .status-success {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .status-failed {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>

<body class="scrollable-page">
    <header class="app-header">
        <div class="logo-area">
            <div class="logo-icon"></div>
            <span class="logo-text">QUANTIX AI CORE</span>
        </div>
        <nav class="main-nav" id="main-nav">
            <a href="../index.html" class="nav-link">Overview</a>
            <a href="index.html" class="nav-link">Live Signal</a>
            <a href="mt4_dashboard.html" class="nav-link active">MT4 Execution</a>
            <a href="../api/index.html" class="nav-link">API</a>
        </nav>
        <div class="status-tag hide-mobile"
            style="width: 350px; display: flex; justify-content: flex-end; font-size: 0.7rem; color: var(--text-dim); align-items: center; gap: 12px;">
            <div
                style="background: rgba(13, 114, 229, 0.1); color: #0072e5; padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(13, 114, 229, 0.2); font-weight: 800; display: flex; align-items: center; gap: 6px;">
                <span class="status-dot"
                    style="background: #0072e5; box-shadow: 0 0 8px #0072e5; margin: 0; width: 6px; height: 6px; border-radius: 50%; display: inline-block;"></span>
                LIVE BRIDGE
            </div>
        </div>
    </header>

    <main class="dashboard-grid">
        <div class="bento-block">
            <div class="block-header">
                <span>⚡ MT4 Order Execution Callback Stream</span>
                <span id="refresh-status" style="color: var(--text-dim); font-size: 0.7rem;">Auto-refreshing...</span>
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>TIME (UTC)</th>
                            <th>SIGNAL ID</th>
                            <th>STATUS</th>
                            <th>TICKET ID</th>
                            <th>EXEC PRICE</th>
                            <th>ERROR MESSAGE</th>
                        </tr>
                    </thead>
                    <tbody id="execution-logs">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>

            <div id="empty-state" style="text-align: center; color: var(--text-dim); padding: 40px; display: none;">
                No execution logs received yet.
            </div>
        </div>
    </main>

    <script>
        async function fetchExecutions() {
            try {
                const res = await fetch('https://quantixapiserver-production.up.railway.app/api/v1/mt4/executions');
                const data = await res.json();

                const tableBody = document.getElementById('execution-logs');
                const emptyState = document.getElementById('empty-state');

                if (data.executions && data.executions.length > 0) {
                    emptyState.style.display = 'none';
                    tableBody.innerHTML = '';

                    data.executions.forEach(log => {
                        const tr = document.createElement('tr');

                        const timeStr = new Date(log.created_at).toLocaleString();
                        const uuidShort = log.signal_id ? log.signal_id.substring(0, 8) + '...' : '-';
                        const statusClass = log.status === 'SUCCESS' ? 'status-success' : 'status-failed';

                        tr.innerHTML = `
                            <td style="color: var(--text-dim);">${timeStr}</td>
                            <td style="color: var(--accent);">${uuidShort}</td>
                            <td><span class="status-badge ${statusClass}">${log.status}</span></td>
                            <td style="color: var(--text-main); font-weight: bold;">${log.ticket || '-'}</td>
                            <td>${log.executed_price ? log.executed_price.toFixed(5) : '-'}</td>
                            <td style="color: var(--text-dim); font-size: 0.75rem;">${log.error_message || '-'}</td>
                        `;
                        tableBody.appendChild(tr);
                    });
                } else {
                    document.getElementById('execution-logs').innerHTML = '';
                    emptyState.style.display = 'block';
                }
            } catch (err) {
                console.error("Failed to fetch MT4 logs:", err);
            }
        }

        // Fetch immediately and poll every 5 seconds
        fetchExecutions();
        setInterval(fetchExecutions, 5000);
    </script>
</body>

</html>
